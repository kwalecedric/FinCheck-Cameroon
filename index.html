<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinCheck Cameroon</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-brand">
        <span class="brand-dot"></span>
        FinCheck Cameroon
      </div>
      <p class="auth-tagline">Your personal fintech monitoring platform</p>

      <!-- TABS -->
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Sign in</button>
        <button class="auth-tab" onclick="switchTab('register')">Register</button>
      </div>

      <!-- LOGIN FORM -->
      <div id="tab-login">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" class="form-input" placeholder="you@email.com"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" class="form-input" placeholder="••••••••"/>
        </div>
        <button onclick="emailLogin()" class="auth-btn">Sign in</button>
        <div class="auth-divider"><span>or</span></div>
        <button onclick="googleLogin()" class="google-btn">
          <svg width="18" height="18" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.5 30.2 0 24 0 14.8 0 6.9 5.4 3 13.3l7.8 6C12.7 13.1 17.9 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 6.1-10 6.1-17z"/>
            <path fill="#FBBC05" d="M10.8 28.7A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7L2.5 13.3A24 24 0 0 0 0 24c0 3.8.9 7.4 2.5 10.6l8.3-5.9z"/>
            <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.1 0-11.3-4.1-13.2-9.6l-8.3 5.9C6.9 42.6 14.8 48 24 48z"/>
          </svg>
          Continue with Google
        </button>
        <div id="login-error" class="auth-error"></div>
      </div>

      <!-- REGISTER FORM -->
      <div id="tab-register" style="display:none">
        <div class="form-group">
          <label>Full name</label>
          <input type="text" id="reg-name" class="form-input" placeholder="Your name"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" class="form-input" placeholder="you@email.com"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" class="form-input" placeholder="Min 6 characters"/>
        </div>
        <button onclick="emailRegister()" class="auth-btn">Create account</button>
        <div class="auth-divider"><span>or</span></div>
        <button onclick="googleLogin()" class="google-btn">
          <svg width="18" height="18" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.5 30.2 0 24 0 14.8 0 6.9 5.4 3 13.3l7.8 6C12.7 13.1 17.9 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 6.1-10 6.1-17z"/>
            <path fill="#FBBC05" d="M10.8 28.7A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7L2.5 13.3A24 24 0 0 0 0 24c0 3.8.9 7.4 2.5 10.6l8.3-5.9z"/>
            <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.1 0-11.3-4.1-13.2-9.6l-8.3 5.9C6.9 42.6 14.8 48 24 48z"/>
          </svg>
          <a href="company-login.html" style="display:block;text-align:center;font-size:13px;
  color:rgba(255,255,255,0.4);text-decoration:none;margin-top:1rem;">
  Company portal →
</a>
          Continue with Google
        </button>
        <div id="reg-error" class="auth-error"></div>
      </div>

    </div>
  </div>
  <script type="module" src="auth.js"></script>
</body>
</html>
